# isetup configuration — edit to match your setup
# Docs: https://github.com/host452b/isetup
#
# Install order (pyramid, bottom-up):
#   Layer 0: bootstrap (auto) — curl, wget, ca-certificates, gnupg
#   Layer 1: 00-base         — apt packages, no external deps
#   Layer 2: 01-lang-runtimes — nvm, node, go, rust, conda (needs curl)
#   Layer 3: 02-git-tools     — gh, glab, lazygit (needs curl)
#   Layer 4: 03-python-dev    — pip packages (needs miniconda)
#   Layer 5: 04-ai-tools      — claude, codex (needs node-lts + curl)
#   Layer 6: 05-shell-enhancements — zoxide, starship (needs curl)
#   Layer 7: 06-system-tools  — debug & network tools (apt)
#   Layer 8: 07-gpu           — conditional NVIDIA packages
#
# Profiles are sorted alphabetically, so 00- 01- 02- prefixes ensure
# correct pyramid ordering.

version: 1

settings:
  log_level: info
  dry_run: false

profiles:
  # ─── Layer 1: System foundation ────────────────────────────────
  # Pure package-manager installs. No shell scripts. No curl needed.
  # The bootstrap phase already installed curl/wget/ca-certs/gnupg.
  00-base:
    tools:
      - name: curl
        apt: curl
        dnf: curl
        pacman: curl
        brew: curl
        choco: curl

      - name: wget
        apt: wget
        dnf: wget
        pacman: wget
        brew: wget
        choco: wget

      - name: git
        apt: git
        dnf: git
        pacman: git
        brew: git
        choco: git

      - name: make
        apt: build-essential
        dnf: make
        pacman: make
        brew: make
        choco: make

      - name: neovim
        apt: neovim
        dnf: neovim
        pacman: neovim
        brew: neovim
        choco: neovim

      - name: tmux
        apt: tmux
        dnf: tmux
        pacman: tmux
        brew: tmux

      - name: fzf
        apt: fzf
        dnf: fzf
        pacman: fzf
        brew: fzf
        choco: fzf

      - name: ripgrep
        apt: ripgrep
        dnf: ripgrep
        pacman: ripgrep
        brew: ripgrep
        choco: ripgrep

      - name: bat
        apt: bat
        dnf: bat
        pacman: bat
        brew: bat
        choco: bat

      - name: eza
        apt: eza
        dnf: eza
        pacman: eza
        brew: eza

      - name: fd
        apt: fd-find
        dnf: fd-find
        pacman: fd
        brew: fd
        choco: fd

      - name: jq
        apt: jq
        dnf: jq
        pacman: jq
        brew: jq
        choco: jq

      - name: yq
        brew: yq
        depends_on: curl
        shell:
          linux: |
            YQ_ARCH=$(uname -m | sed 's/x86_64/amd64/' | sed 's/aarch64/arm64/')
            curl -fsSL "https://github.com/mikefarah/yq/releases/latest/download/yq_linux_${YQ_ARCH}" -o /tmp/yq && sudo install /tmp/yq /usr/local/bin/yq

      - name: tree
        apt: tree
        dnf: tree
        pacman: tree
        brew: tree
        choco: tree

      - name: htop
        apt: htop
        dnf: htop
        pacman: htop
        brew: htop

      - name: btop
        apt: btop
        dnf: btop
        pacman: btop
        brew: btop

      - name: fonts-firacode
        apt: fonts-firacode
        dnf: fira-code-fonts
        pacman: ttf-fira-code
        brew: font-fira-code
        choco: firacode

      - name: zip
        apt: zip
        dnf: zip
        pacman: zip
        brew: zip
        choco: zip

      - name: unzip
        apt: unzip
        dnf: unzip
        pacman: unzip
        brew: unzip
        choco: unzip

  # ─── Layer 2: Language runtimes ────────────────────────────────
  # All shell scripts need curl (guaranteed by bootstrap + 00-base).
  01-lang-runtimes:
    tools:
      - name: nvm
        depends_on: curl
        shell:
          unix: |
            curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
          windows: |
            irm https://github.com/coreybutler/nvm-windows/releases/download/1.1.12/nvm-setup.exe -OutFile nvm-setup.exe

      - name: node-lts
        depends_on: nvm
        shell:
          unix: "source ~/.nvm/nvm.sh && nvm install --lts"
          windows: "nvm install lts && nvm use lts"

      - name: typescript
        depends_on: node-lts
        npm: typescript

      - name: golang
        brew: go
        depends_on: curl
        shell:
          linux: |
            GO_VERSION=$(curl -fsSL "https://go.dev/VERSION?m=text" | head -1)
            curl -fsSL "https://go.dev/dl/${GO_VERSION}.linux-{{.Arch}}.tar.gz" -o /tmp/go.tar.gz
            sudo rm -rf /usr/local/go && sudo tar -C /usr/local -xzf /tmp/go.tar.gz
            echo 'export PATH=$PATH:/usr/local/go/bin' >> ~/.bashrc
          windows: |
            winget install --id GoLang.Go -e --accept-source-agreements
        choco: golang
        winget: GoLang.Go

      - name: rust
        depends_on: curl
        shell:
          unix: "curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y"
          windows: |
            irm https://win.rustup.rs/x86_64 -OutFile rustup-init.exe
            .\rustup-init.exe -y

      - name: miniconda
        depends_on: curl
        shell:
          linux: |
            curl -fsSL https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-{{.Arch}}.sh -o /tmp/miniconda.sh
            bash /tmp/miniconda.sh -b -p $HOME/miniconda3
            $HOME/miniconda3/bin/conda config --set auto_activate_base false
            $HOME/miniconda3/bin/conda init
          darwin: |
            curl -fsSL https://repo.anaconda.com/miniconda/Miniconda3-latest-MacOSX-{{.Arch}}.sh -o /tmp/miniconda.sh
            bash /tmp/miniconda.sh -b -p $HOME/miniconda3
            $HOME/miniconda3/bin/conda config --set auto_activate_base false
            $HOME/miniconda3/bin/conda init
          windows: |
            irm https://repo.anaconda.com/miniconda/Miniconda3-latest-Windows-x86_64.exe -OutFile miniconda.exe
            Start-Process .\miniconda.exe -ArgumentList '/S /D=%USERPROFILE%\miniconda3' -Wait
            & "$env:USERPROFILE\miniconda3\condabin\conda" config --set auto_activate_base false

      - name: mise
        brew: mise
        depends_on: curl
        shell:
          unix: "curl https://mise.run | sh"

      - name: tmux-ide
        depends_on: node-lts
        npm: tmux-ide

  # ─── Layer 3: Git & CI/CD tools ───────────────────────────────
  02-git-tools:
    tools:
      - name: glab
        brew: glab
        choco: glab
        winget: glab.glab
        depends_on: curl
        shell:
          linux: |
            curl -fsSL "https://packages.gitlab.com/install/repositories/gitlab/glab/script.deb.sh" | sudo bash
            sudo apt-get install -y glab

      - name: gh
        brew: gh
        choco: gh
        winget: GitHub.cli
        depends_on: wget
        shell:
          linux: |
            (type -p wget >/dev/null || (sudo apt update && sudo apt install wget -y)) \
              && sudo mkdir -p -m 755 /etc/apt/keyrings \
              && out=$(mktemp) && wget -nv -O$out https://cli.github.com/packages/githubcli-archive-keyring.gpg \
              && cat $out | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null \
              && sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg \
              && sudo mkdir -p -m 755 /etc/apt/sources.list.d \
              && echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
              && sudo apt update \
              && sudo apt install gh -y

      - name: lazygit
        brew: lazygit
        choco: lazygit
        depends_on: curl
        shell:
          linux: |
            LAZYGIT_VERSION=$(curl -fsSL "https://api.github.com/repos/jesseduffield/lazygit/releases/latest" | grep -oP '"tag_name": "v\K[^"]+')
            LG_ARCH=$(uname -m | sed 's/x86_64/x86_64/' | sed 's/aarch64/arm64/')
            curl -fsSL "https://github.com/jesseduffield/lazygit/releases/latest/download/lazygit_${LAZYGIT_VERSION}_Linux_${LG_ARCH}.tar.gz" | sudo tar xz -C /usr/local/bin lazygit

      - name: delta
        brew: git-delta
        choco: delta
        depends_on: curl
        shell:
          linux: |
            DELTA_VER=$(curl -fsSL "https://api.github.com/repos/dandavison/delta/releases/latest" | grep -oP '"tag_name": "\K[^"]+')
            curl -fsSL "https://github.com/dandavison/delta/releases/download/${DELTA_VER}/git-delta_${DELTA_VER}_$(dpkg --print-architecture).deb" -o /tmp/git-delta.deb && sudo dpkg -i /tmp/git-delta.deb

      - name: gitlab-runner
        brew: gitlab-runner
        depends_on: curl
        shell:
          linux: |
            curl -fsSL "https://packages.gitlab.com/install/repositories/runner/gitlab-runner/script.deb.sh" | sudo bash
            sudo apt-get install -y gitlab-runner

  # ─── Layer 4: Python ecosystem ─────────────────────────────────
  # All tools here depend on miniconda (provides pip).
  03-python-dev:
    tools:
      - name: uv
        depends_on: miniconda
        pip:
          - uv

      - name: pip-tools
        depends_on: miniconda
        pip:
          - httpie
          - black
          - ruff

      - name: pip-build-tools
        depends_on: miniconda
        pip:
          - build
          - twine
          - hatchling==1.26.3
          - pkginfo==1.12.1.1

      - name: huggingface-hub
        depends_on: miniconda
        pip:
          - huggingface_hub

      - name: pr-analyzers
        depends_on: miniconda
        pip:
          - gitlab-pr-analyzer
          - github-pr-analyzer
          - jira-lens

      - name: playwright
        depends_on: miniconda
        pip:
          - playwright

      - name: pgcli
        depends_on: miniconda
        pip:
          - pgcli

      - name: ai-ml-libs
        depends_on: miniconda
        pip:
          - chromadb
          - pgvector
          - langsmith
          - langfuse

  # ─── Layer 5: AI & LLM tools ──────────────────────────────────
  04-ai-tools:
    tools:
      - name: claude-code
        depends_on: node-lts
        shell:
          unix: "curl -fsSL https://claude.ai/install.sh | bash"
          windows: "irm https://claude.ai/install.ps1 | iex"

      - name: codex-cli
        depends_on: node-lts
        npm: "@openai/codex"

      - name: cursor
        depends_on: curl
        shell:
          unix: "curl -fsS https://cursor.com/install | bash"

      - name: yoyo
        depends_on: curl
        shell:
          unix: "curl -fsSL https://github.com/host452b/yoyo/releases/latest/download/install.sh | sh"

      - name: arxs
        depends_on: curl
        shell:
          unix: "curl -fsSL https://raw.githubusercontent.com/host452b/arxs/main/install.sh | sh"
          windows: "irm https://raw.githubusercontent.com/host452b/arxs/main/install.ps1 | iex"

      - name: ollama
        brew: ollama
        depends_on: curl
        shell:
          linux: "curl -fsSL https://ollama.com/install.sh | sh"

  # ─── Layer 6: Shell enhancements ──────────────────────────────
  05-shell-enhancements:
    tools:
      - name: zoxide
        brew: zoxide
        depends_on: curl
        shell:
          unix: "curl -sSfL https://raw.githubusercontent.com/ajeetdsouza/zoxide/main/install.sh | sh"

      - name: starship
        brew: starship
        depends_on: curl
        shell:
          unix: "curl -sS https://starship.rs/install.sh | sh -s -- -y"

      - name: direnv
        apt: direnv
        dnf: direnv
        pacman: direnv
        brew: direnv

  # ─── Layer 7: System & debug tools ────────────────────────────
  06-system-tools:
    tools:
      - name: lsof
        apt: lsof
        dnf: lsof
        pacman: lsof

      - name: netcat
        apt: netcat-openbsd
        dnf: nmap-ncat
        pacman: openbsd-netcat

      - name: tcpdump
        apt: tcpdump
        dnf: tcpdump
        pacman: tcpdump

      - name: dnsutils
        apt: dnsutils
        dnf: bind-utils
        pacman: bind
        brew: bind

      - name: strace
        apt: strace
        dnf: strace
        pacman: strace

      - name: sqlite3
        apt: sqlite3
        dnf: sqlite
        pacman: sqlite
        brew: sqlite
        choco: sqlite

      - name: speedtest-cli
        apt: speedtest-cli
        dnf: speedtest-cli
        pacman: speedtest-cli
        brew: speedtest-cli
        pip:
          - speedtest-cli

  # ─── Layer 8: GPU (conditional) ────────────────────────────────
  07-gpu:
    when: has_gpu
    tools:
      - name: cuda-toolkit
        apt: nvidia-cuda-toolkit
        dnf: nvidia-cuda-toolkit
        pacman: cuda

      - name: nvidia-driver
        apt: nvidia-driver-550
