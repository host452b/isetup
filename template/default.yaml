# isetup configuration — edit to match your setup
# Docs: https://github.com/host452b/isetup

version: 1

settings:
  log_level: info
  dry_run: false

profiles:
  # Language runtimes — installed first, other tools depend on these
  lang-runtimes:
    tools:
      - name: nvm
        shell:
          unix: |
            curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
          windows: |
            irm https://github.com/coreybutler/nvm-windows/releases/download/1.1.12/nvm-setup.exe -OutFile nvm-setup.exe

      - name: node-lts
        depends_on: nvm
        shell:
          unix: "source ~/.nvm/nvm.sh && nvm install --lts"
          windows: "nvm install lts && nvm use lts"

      - name: typescript
        depends_on: node-lts
        npm: typescript

      - name: golang
        brew: go
        shell:
          linux: |
            GO_VERSION=$(curl -fsSL "https://go.dev/VERSION?m=text" | head -1)
            curl -fsSL "https://go.dev/dl/${GO_VERSION}.linux-{{.Arch}}.tar.gz" -o /tmp/go.tar.gz
            sudo rm -rf /usr/local/go && sudo tar -C /usr/local -xzf /tmp/go.tar.gz
            echo 'export PATH=$PATH:/usr/local/go/bin' >> ~/.bashrc
          windows: |
            winget install --id GoLang.Go -e --accept-source-agreements
        choco: golang
        winget: GoLang.Go

      - name: rust
        shell:
          unix: "curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y"
          windows: |
            irm https://win.rustup.rs/x86_64 -OutFile rustup-init.exe
            .\rustup-init.exe -y

      - name: miniconda
        shell:
          linux: |
            curl -fsSL https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-{{.Arch}}.sh -o /tmp/miniconda.sh
            bash /tmp/miniconda.sh -b -p $HOME/miniconda3
            $HOME/miniconda3/bin/conda init
          darwin: |
            curl -fsSL https://repo.anaconda.com/miniconda/Miniconda3-latest-MacOSX-{{.Arch}}.sh -o /tmp/miniconda.sh
            bash /tmp/miniconda.sh -b -p $HOME/miniconda3
            $HOME/miniconda3/bin/conda init
          windows: |
            irm https://repo.anaconda.com/miniconda/Miniconda3-latest-Windows-x86_64.exe -OutFile miniconda.exe
            Start-Process .\miniconda.exe -ArgumentList '/S /D=%USERPROFILE%\miniconda3' -Wait

  base:
    tools:
      - name: git
        apt: git
        brew: git
        choco: git

      - name: neovim
        apt: neovim
        brew: neovim
        choco: neovim

      - name: tmux
        apt: tmux
        brew: tmux

      - name: tmux-ide
        depends_on: node-lts
        npm: tmux-ide

      - name: fzf
        apt: fzf
        brew: fzf
        choco: fzf

      - name: ripgrep
        apt: ripgrep
        brew: ripgrep
        choco: ripgrep

  git-tools:
    tools:
      - name: glab
        brew: glab
        choco: glab
        winget: glab.glab
        shell:
          linux: |
            curl -fsSL "https://packages.gitlab.com/install/repositories/gitlab/glab/script.deb.sh" | sudo bash
            sudo apt-get install -y glab

      - name: gh
        brew: gh
        choco: gh
        winget: GitHub.cli
        shell:
          linux: |
            (type -p wget >/dev/null || (sudo apt update && sudo apt install wget -y)) \
              && sudo mkdir -p -m 755 /etc/apt/keyrings \
              && out=$(mktemp) && wget -nv -O$out https://cli.github.com/packages/githubcli-archive-keyring.gpg \
              && cat $out | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null \
              && sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg \
              && sudo mkdir -p -m 755 /etc/apt/sources.list.d \
              && echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
              && sudo apt update \
              && sudo apt install gh -y

  python-dev:
    tools:
      - name: uv
        depends_on: miniconda
        pip:
          - uv

      - name: pip-tools
        depends_on: miniconda
        pip:
          - httpie
          - black
          - ruff

      - name: pip-build-tools
        depends_on: miniconda
        pip:
          - build
          - twine
          - hatchling==1.26.3
          - pkginfo==1.12.1.1

      - name: pr-analyzers
        depends_on: miniconda
        pip:
          - gitlab-pr-analyzer
          - github-pr-analyzer
          - jira-lens

  ai-tools:
    tools:
      - name: claude-code
        depends_on: node-lts
        shell:
          unix: "curl -fsSL https://claude.ai/install.sh | bash"
          windows: "irm https://claude.ai/install.ps1 | iex"

      - name: codex-cli
        depends_on: node-lts
        npm: "@openai/codex"

      - name: cursor
        shell:
          unix: "curl -fsS https://cursor.com/install | bash"

      - name: yoyo
        shell:
          unix: "curl -fsSL https://github.com/host452b/yoyo/releases/latest/download/install.sh | sh"

      - name: arxs
        shell:
          unix: "curl -fsSL https://raw.githubusercontent.com/host452b/arxs/main/install.sh | sh"
          windows: "irm https://raw.githubusercontent.com/host452b/arxs/main/install.ps1 | iex"

  gpu:
    when: has_gpu
    tools:
      - name: cuda-toolkit
        apt: nvidia-cuda-toolkit

      - name: nvidia-driver
        apt: nvidia-driver-550
